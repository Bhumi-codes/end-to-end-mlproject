
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predictor - Dark Green Theme</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #064e3b 0%, #065f46 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 40px 0;
        }
        .main-card {
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            padding: 2.5rem;
            max-width: 750px;
            margin: auto;
        }
        .form-label { font-weight: 600; color: #064e3b; }
        .form-select, .form-control {
            border: 1px solid #d1fae5;
            padding: 10px;
        }
        .form-select:focus, .form-control:focus {
            border-color: #10b981;
            box-shadow: 0 0 0 0.25rem rgba(16, 185, 129, 0.25);
        }
        .btn-predict {
            background: #059669;
            border: none;
            padding: 14px;
            font-weight: 700;
            color: white;
            transition: 0.3s;
        }
        .btn-predict:hover {
            background: #047857;
            transform: translateY(-2px);
        }
        .result-section {
            background: #f0fdf4;
            border: 2px solid #10b981;
            padding: 1.5rem;
            border-radius: 12px;
            margin-top: 2rem;
            text-align: center;
            color: #064e3b;
        }
        h2.title { color: #064e3b; font-weight: 800; text-align: center; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="main-card">
        <h2 class="title">Performance Predictor</h2>
        
        <form action="{{ url_for('predict_datapoint')}}" method="post">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Gender</label>
                    <select class="form-select" name="gender" required>
                        <option selected disabled value="">Select Gender</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Race/Ethnicity</label>
                    <select class="form-select" name="race_ethnicity" required>
                        <option selected disabled value="">Select Group</option>
                        <option value="group A">Group A</option>
                        <option value="group B">Group B</option>
                        <option value="group C">Group C</option>
                        <option value="group D">Group D</option>
                        <option value="group E">Group E</option>
                    </select>
                </div>
                <div class="col-md-12 mb-3">
                    <label class="form-label">Parental Education</label>
                    <select class="form-select" name="parental_level_of_education" required>
                        <option selected disabled value="">Select Education</option>
                        <option value="associate's degree">Associate's Degree</option>
                        <option value="bachelor's degree">Bachelor's Degree</option>
                        <option value="high school">High School</option>
                        <option value="master's degree">Master's Degree</option>
                        <option value="some college">Some College</option>
                        <option value="some high school">Some High School</option>
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Lunch Type</label>
                    <select class="form-select" name="lunch" required>
                        <option selected disabled value="">Select Type</option>
                        <option value="free/reduced">Free/Reduced</option>
                        <option value="standard">Standard</option>
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Test Prep Course</label>
                    <select class="form-select" name="test_preparation_course" required>
                        <option selected disabled value="">Select Status</option>
                        <option value="none">None</option>
                        <option value="completed">Completed</option>
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Writing Score</label>
                    <input class="form-control" type="number" name="writing_score" min="0" max="100" required>
                </div>
                <div class="col-md-6 mb-4">
                    <label class="form-label">Reading Score</label>
                    <input class="form-control" type="number" name="reading_score" min="0" max="100" required>
                </div>
            </div>
            <div class="d-grid">
                <button class="btn btn-predict shadow-sm" type="submit">Calculate Predicted Math Score</button>
            </div>
        </form>

        {% if results %}
        <div class="result-section">
            <h4 class="mb-0">The predicted Math Score is: <strong>{{ results }}</strong></h4>
        </div>
        {% endif %}
    </div>
</div>

</body>
</html>
