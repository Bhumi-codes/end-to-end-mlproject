

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Analytics Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            /* Deep Forest Gradient */
            background: radial-gradient(circle at center, #065f46 0%, #064e3b 100%);
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            color: white;
            overflow: hidden;
        }

        /* Abstract background shapes for depth */
        .shape {
            position: absolute;
            border-radius: 50%;
            background: rgba(16, 185, 129, 0.1);
            filter: blur(80px);
            z-index: -1;
        }

        .hero-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 5rem 3rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
        }

        h1 {
            font-size: 4rem;
            font-weight: 900;
            letter-spacing: -1px;
            background: linear-gradient(to right, #ffffff, #d1fae5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1.5rem;
        }

        p {
            font-size: 1.25rem;
            color: #a7f3d0;
            max-width: 600px;
            margin: 0 auto 3rem auto;
            line-height: 1.6;
        }

        .btn-launch {
            background: #ffffff;
            color: #064e3b;
            font-weight: 700;
            padding: 18px 45px;
            border-radius: 100px;
            text-decoration: none;
            font-size: 1.1rem;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: inline-flex;
            align-items: center;
            gap: 10px;
            border: none;
        }

        .btn-launch:hover {
            background: #ecfdf5;
            transform: scale(1.05) translateY(-5px);
            color: #059669;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .status-badge {
            background: rgba(52, 211, 153, 0.2);
            color: #34d399;
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            display: inline-block;
        }
    </style>

</head>
<body>

    <div class="shape" style="width: 400px; height: 400px; top: -100px; left: -100px;"></div>
    <div class="shape" style="width: 300px; height: 300px; bottom: -50px; right: -50px;"></div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-9 text-center">
                <div class="hero-card">
                    <!-- <span class="status-badge">AI Powered Engine</span> -->
                    <h1>Predictive Student <br>Performance</h1>
                    <p>
                        Leverage Machine Learning to estimate academic performance based on demographic and social factors.
                    </p>
                    
                    <a href="{{ url_for('predict_datapoint') }}" class="btn-launch shadow">
                        Launch Predictor 
                    </a>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
